<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#459492"/>
      <stop offset="100%" stop-color="#55B3AE"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5DB786"/>
      <stop offset="100%" stop-color="#55B3AE"/>
    </linearGradient>
    <linearGradient id="coral" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E48C75"/>
      <stop offset="100%" stop-color="#C4806E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="#121212"/>

  <!-- Swirl arcs — 3 crescents -->
  <g transform="translate(256, 256)">
    <!-- Teal crescent -->
    <path d="M 185,-108 A 215,215 0 0,1 -108,185 C -92,164 -82,144 -77,128 A 154,154 0 0,0 128,-77 C 144,-82 164,-92 185,-108 Z" fill="url(#teal)" opacity="0.92"/>
    <!-- Green crescent (rotated 120) -->
    <path d="M 185,-108 A 215,215 0 0,1 -108,185 C -92,164 -82,144 -77,128 A 154,154 0 0,0 128,-77 C 144,-82 164,-92 185,-108 Z" fill="url(#green)" opacity="0.88" transform="rotate(120)"/>
    <!-- Coral crescent (rotated 240) -->
    <path d="M 185,-108 A 215,215 0 0,1 -108,185 C -92,164 -82,144 -77,128 A 154,154 0 0,0 128,-77 C 144,-82 164,-92 185,-108 Z" fill="url(#coral)" opacity="0.78" transform="rotate(240)"/>
  </g>

  <!-- Hourglass -->
  <g transform="translate(256, 256)">
    <!-- Top bulb -->
    <path d="M -56,-123 C -56,-103 -20,-26 0,-10 C 20,-26 56,-103 56,-123 C 56,-138 31,-144 0,-144 C -31,-144 -56,-138 -56,-123 Z" fill="white" opacity="0.95"/>
    <!-- Bottom bulb -->
    <path d="M 0,10 C -20,26 -56,103 -56,123 C -56,138 -31,144 0,144 C 31,144 56,138 56,123 C 56,103 20,26 0,10 Z" fill="white" opacity="0.90"/>
    <!-- Center pinch -->
    <circle cx="0" cy="0" r="13" fill="white" opacity="0.95"/>
  </g>
</svg>
